name: Probe NBA API from Actions

# Manual, throwaway experiment: can GitHub's runners reach stats.nba.com?
# That undocumented API is known to block datacenter/cloud IPs, and the answer
# decides whether scheduled ingest can run here or needs a residential runner.
# Hits both endpoints ingest uses: the game index and play-by-play.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install nba_api==1.11.4

      - name: Try to reach stats.nba.com
        run: |
          python - <<'PY'
          import sys, time
          from nba_api.stats.endpoints import leaguegamefinder, playbyplayv3

          def ok(msg):  print(f"PASS  {msg}")
          def bad(msg): print(f"FAIL  {msg}")

          # 1) Game index (LeagueGameFinder) - the cheap "what games exist" call.
          t0 = time.time()
          try:
              finder = leaguegamefinder.LeagueGameFinder(
                  season_nullable="2023-24",
                  season_type_nullable="Regular Season",
                  league_id_nullable="00",
                  timeout=30,
              )
              games = finder.get_data_frames()[0]
              ok(f"LeagueGameFinder: {len(games)} team-rows in {time.time()-t0:.1f}s")
          except Exception as exc:
              bad(f"LeagueGameFinder: {type(exc).__name__}: {exc}")
              print("RESULT: BLOCKED (game index unreachable from Actions)")
              sys.exit(1)

          # 2) Play-by-play (PlayByPlayV3) for a few games - the per-game pull.
          game_ids = games["GAME_ID"].dropna().unique()[:3]
          failures = 0
          for gid in game_ids:
              t = time.time()
              try:
                  pbp = playbyplayv3.PlayByPlayV3(game_id=str(gid), timeout=30)
                  rows = len(pbp.get_data_frames()[0])
                  ok(f"PlayByPlayV3 {gid}: {rows} rows in {time.time()-t:.1f}s")
              except Exception as exc:
                  failures += 1
                  bad(f"PlayByPlayV3 {gid}: {type(exc).__name__}: {exc}")
              time.sleep(0.6)  # same polite throttle ingest uses

          if failures:
              print(f"RESULT: PARTIAL/BLOCKED ({failures}/{len(game_ids)} pbp calls failed)")
              sys.exit(1)
          print("RESULT: WORKS (Actions can reach stats.nba.com)")
          PY
