name: knicks_win_probability
version: "1.0.0"
config-version: 2

profile: knicks_win_probability

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

seeds:
  knicks_win_probability:
    franchise_map:
      +column_types:
        historical_tricode: varchar
        current_tricode: varchar
    team_names:
      +column_types:
        tricode: varchar
        full_name: varchar

models:
  knicks_win_probability:
    staging:
      +materialized: view      # thin wrappers, always fresh, no storage cost
    intermediate:
      +materialized: view      # reusable building blocks, recomputed on demand
    mart:
      +materialized: table     # persisted in DuckDB, queried by train.py
