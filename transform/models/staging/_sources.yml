version: 2

sources:
  - name: nba
    description: Raw NBA data loaded from nba_api CSVs by src/load_duckdb.py
    schema: main
    tables:
      - name: games
        description: One row per game with the final result (the model's label).
        columns:
          - name: game_id
            tests: [unique, not_null]
          - name: home_won
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [0, 1]

      - name: play_by_play
        description: Event-level stream - one row per play across all games.

      - name: boxscores
        description: >
          Traditional box score - one row per (game, player) with the starter
          order, minutes, and full line. Pulled by src/ingest_boxscores.py.

      - name: lineups
        description: >
          On-court five-man stints per game, written by src/build_lineups.py.
          Lineup reconstruction is a sequential walk so it stays in Python; this
          table is its output, ready for possession/RAPM models to build on.

      - name: player_rapm
        description: >
          Per-season learned player value (regularized adjusted plus-minus),
          written by src/build_rapm.py from the reconstructed possessions. The
          ridge regression stays in Python; this table is its output.
        columns:
          - name: value
            tests: [not_null]

      - name: team_ratings
        description: >
          Pre-game Elo rating per team per game, written by src/build_team_ratings.py.
          Elo is a sequential update loop so it stays in Python; this table is its
          output, joined into the model input by dbt.
        columns:
          - name: game_id
            tests: [unique, not_null]
          - name: rating_diff
            tests: [not_null]
