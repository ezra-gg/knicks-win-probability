# Single source of truth for tunable parameters.
# Loaded by src/config.py; edit here rather than hunting through the code.

# Player RAPM - regularized adjusted plus-minus (src/build_rapm.py)
rapm:
  # Ridge strength. Higher shrinks player values toward 0; RAPM needs heavy
  # regularization because teammates are collinear. Tune by the spread of values
  # (stars land a few points above average, not double digits).
  ridge_alpha: 2000

# Elo team-strength ratings (src/build_team_ratings.py)
elo:
  base_rating: 1500   # anchor every team starts at; arbitrary, only gaps matter
  k_factor: 20        # how far one game moves a rating (FiveThirtyEight's NBA value)
  # Between seasons, regress each team toward the mean by roster turnover
  # (1 - continuity). Toggle for A/B-ing the roster-aware transition.
  regress_between_seasons: true

# Win-probability model (src/train.py)
model:
  features:           # the inputs the model is allowed to see
    - seconds_remaining
    - score_diff
    - is_overtime
    - is_playoff
    - rating_diff
    - roster_value_diff       # learned RAPM roster gap (complementary to the box one)
    - roster_value_box_diff   # box-score (Game Score) roster gap; stabilizes RAPM's noise
  label: home_won

  # Three-way time split. The actual seasons are derived from the data; these
  # only set how many recent seasons go to each holdout window, so they slide
  # forward automatically as new seasons arrive.
  n_holdout: 2        # most recent seasons reserved for the honest final score
  n_validation: 2     # seasons before that, used for early stopping

  # XGBoost hyperparameters. n_estimators is a ceiling; early stopping picks
  # the real tree count from the validation curve.
  xgboost:
    n_estimators: 2000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50
